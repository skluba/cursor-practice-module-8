# --- SonarCloud (required together) ---

sonar.projectKey=cursor-practice-module-8
sonar.projectName=Cursor Practice Module 8
sonar.organization=skluba

# Analyzer base directory (scanner working dir is CI workspace root — see workflows)
sonar.sources=frontend,backend

# Do not pin a single language: backend is Python, frontend is TypeScript/React
sonar.sourceEncoding=UTF-8

# Test reports (paths relative to project base dir / workspace root when projectBaseDir is repo root)
sonar.junit.reportPaths=backend/test-results/pytest-junit.xml,frontend/test-results/vitest-junit.xml

# Noise reduction (do not exclude */test-results* — junit report paths live there)
sonar.exclusions=**/node_modules/**/*,**/dist/**/*,**/build/**/*,**/coverage/**/*,**/playwright-report/**/*

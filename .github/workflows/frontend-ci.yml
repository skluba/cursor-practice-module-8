# Frontend: install, audit, lint, tests, Playwright
name: Frontend CI

on:
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: frontend

jobs:
  qa:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Dependency audit (npm)
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: |
          mkdir -p test-results
          npm run test -- --run --reporter=github-actions --reporter=junit --outputFile.junit=test-results/vitest-junit.xml

      - name: Build (preview bundle for Playwright)
        run: npm run build

      - name: Install Playwright (Chromium)
        run: npx playwright install chromium --with-deps

      - name: End-to-end tests
        run: npm run test:e2e

      - name: Upload failure artifacts (Playwright / Vitest)
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: frontend-ci-failure-${{ github.run_number }}
          path: |
            frontend/playwright-report
            frontend/test-results
          retention-days: 14
          if-no-files-found: ignore

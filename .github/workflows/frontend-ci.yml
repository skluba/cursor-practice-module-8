# Frontend: install, audit, lint, tests, Playwright
name: Frontend CI

on:
  pull_request:
    paths:
      - "frontend/**"
      - "sonar-project.properties"
      - ".github/workflows/frontend-ci.yml"
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "sonar-project.properties"
      - ".github/workflows/frontend-ci.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: frontend

jobs:
  qa:
    name: Frontend QA
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Dependency audit (npm)
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: |
          mkdir -p test-results
          npm run test -- --run --coverage --reporter=github-actions --reporter=junit --outputFile.junit=test-results/vitest-junit.xml

      - name: Upload coverage report (LCOV / summary)
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage-${{ github.run_number }}
          path: |
            frontend/test-results/coverage/lcov.info
            frontend/test-results/coverage/coverage-summary.json
          retention-days: 14
          if-no-files-found: warn

      - name: Build (preview bundle for Playwright)
        run: npm run build

      - name: Install Playwright (Chromium)
        run: npx playwright install chromium --with-deps

      - name: End-to-end tests
        run: npm run test:e2e

      - name: Upload failure artifacts (Playwright / Vitest)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-ci-failure-${{ github.run_number }}
          path: |
            frontend/playwright-report
            frontend/test-results
          retention-days: 14
          if-no-files-found: ignore

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        with:
          projectBaseDir: ${{ github.workspace }}
          args: >-
            ${{ vars.SONARCLOUD_ORGANIZATION != '' && format('-Dsonar.organization={0}', vars.SONARCLOUD_ORGANIZATION) || '' }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

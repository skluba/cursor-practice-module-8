# Backend: lint, dependency audit, tests
name: Backend CI

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: backend

jobs:
  qa:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: app_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d app_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Dependency audit (pip-audit)
        run: pip-audit -r requirements.txt -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Apply database migrations
        env:
          DATABASE_URL: postgresql+psycopg://app:app@localhost:5432/app_test
          REDIS_URL: redis://localhost:6379/0
        run: FLASK_APP=wsgi flask db upgrade

      - name: Run tests (pytest)
        env:
          DATABASE_URL: postgresql+psycopg://app:app@localhost:5432/app_test
          REDIS_URL: redis://localhost:6379/0
        run: mkdir -p test-results && pytest --junitxml=test-results/pytest-junit.xml -o junit_family=xunit2

      - name: Upload failure artifacts (pytest)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: backend-pytest-junit-${{ github.run_number }}
          path: backend/test-results/
          retention-days: 14
          if-no-files-found: warn

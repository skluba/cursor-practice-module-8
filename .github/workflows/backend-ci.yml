# Backend: lint, dependency audit, tests
name: Backend CI

on:
  pull_request:
    paths:
      - "backend/**"
      - "sonar-project.properties"
      - ".github/workflows/backend-ci.yml"
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "sonar-project.properties"
      - ".github/workflows/backend-ci.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: backend

jobs:
  qa:
    name: Backend QAs
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: app_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d app_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements*.txt
            backend/uv.lock
            backend/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Dependency audit (pip-audit)
        run: pip-audit -r requirements.txt -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Apply database migrations
        env:
          DATABASE_URL: postgresql+psycopg://app:app@localhost:5432/app_test
          REDIS_URL: redis://localhost:6379/0
        run: FLASK_APP=wsgi flask db upgrade

      - name: Run tests (pytest)
        env:
          DATABASE_URL: postgresql+psycopg://app:app@localhost:5432/app_test
          REDIS_URL: redis://localhost:6379/0
        run: mkdir -p test-results && pytest --junitxml=test-results/pytest-junit.xml -o junit_family=xunit2

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage-${{ github.run_number }}
          path: backend/test-results/coverage.xml
          retention-days: 14
          if-no-files-found: warn

      - name: Upload failure artifacts (pytest)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: backend-pytest-junit-${{ github.run_number }}
          path: backend/test-results/
          retention-days: 14
          if-no-files-found: warn

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@4bd40bf8411ed104853e94a3746ec92bc92845fde2b27dbf5c33fb5cfa8ecbe9 # v8.0.1
        with:
          # Always resolve properties from repo root (job default cwd is backend/)
          projectBaseDir: ${{ github.workspace }}
          # SonarCloud requires organization + projectKey. Pass org here so you can store it as a repo variable instead of committing it.
          args: >-
            ${{ vars.SONARCLOUD_ORGANIZATION != '' && format('-Dsonar.organization={0}', vars.SONARCLOUD_ORGANIZATION) || '' }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          # Self-hosted SonarQube Server (leave unset when using SonarCloud)
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
